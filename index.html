<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>some random html</title>
</head>

<body>
    <main id="game-world">
        <div id="start-screen">
            <h1>Welcome to Monster Jump!</h1>
            <p>Help the monster dodge the obstacles!</p>
            <button id="start-btn">Play</button>
        </div>
        <div id="game-over-screen">
            <h2>You Hit an Obstacle! Game Over!</h2>
            <p id="final-score"></p>
            <button id="play-again-btn">Play Again</button>
        </div>
        <div id="character-window" class="character-window">
            <img id="pink-monster" class="pink-monster pink-monster-idle"
                src="./images/Pink_Monster_Idle_4_32px_frames.png" alt="pink monster character">
        </div>
        <div id="score">score: 0</div>
        <div id="high-score">highest score: 0</div>
    </main>
    <script src="main.js"></script>
</body>

</html>
